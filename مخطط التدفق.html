<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 مخطط التدفق - تنظيم الأحداث</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        .container {
            background: white;
            border-radius: 30px;
            padding: 25px;
            max-width: 1000px;
            width: 100%;
        }
        h1 { text-align: center; color: #2c3e50; }
        .flow-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        .flow-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .flow-box {
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            padding: 15px;
            min-width: 150px;
            text-align: center;
            position: relative;
            border: 2px solid #3498db;
        }
        .flow-box .step-number {
            background: #3498db;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .flow-box textarea {
            width: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 14px;
            resize: vertical;
        }
        .arrow {
            font-size: 24px;
            color: #3498db;
            align-self: center;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        .add-btn { background: #27ae60; }
        .remove-btn { background: #e74c3c; }
        .topic-input {
            margin: 20px 0;
            text-align: center;
        }
        input {
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #ccc;
            width: 250px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 مخطط التدفق</h1>
    <p style="text-align: center;">نظّم الأحداث أو الخطوات بشكل تسلسلي</p>
    
    <div class="topic-input">
        <input type="text" id="topicName" placeholder="عنوان المخطط (مثل: مراحل كتابة البحث)">
        <button onclick="setTopic()">تعيين العنوان</button>
    </div>
    
    <div class="flow-container" id="flowContainer"></div>
    
    <div class="controls">
        <button class="add-btn" onclick="addStep()">➕ إضافة خطوة</button>
        <button class="remove-btn" onclick="removeLastStep()">➖ حذف آخر خطوة</button>
        <button onclick="saveFlowMap()">💾 حفظ المخطط</button>
        <button onclick="loadFlowMap()">📂 تحميل آخر مخطط</button>
    </div>
</div>

<script>
    let steps = ["الخطوة 1: تحديد الفكرة الرئيسية", "الخطوة 2: جمع المعلومات", "الخطوة 3: تنظيم الأفكار", "الخطوة 4: كتابة المسودة", "الخطوة 5: المراجعة والتنقيح"];
    let topic = "مخطط العمل";
    
    function renderFlow() {
        const container = document.getElementById('flowContainer');
        container.innerHTML = `<h3 style="text-align:center; color:#2c3e50;">📌 ${topic}</h3>`;
        
        steps.forEach((step, index) => {
            const row = document.createElement('div');
            row.className = 'flow-row';
            row.innerHTML = `
                <div class="flow-box">
                    <div class="step-number">${index + 1}</div>
                    <textarea rows="2" onchange="updateStep(${index}, this.value)">${step}</textarea>
                </div>
                ${index < steps.length - 1 ? '<div class="arrow">⬇️</div>' : ''}
            `;
            container.appendChild(row);
        });
        
        // حفظ تلقائي في localStorage
        saveToLocal();
    }
    
    function updateStep(index, newValue) {
        steps[index] = newValue;
        saveToLocal();
    }
    
    function addStep() {
        steps.push(`الخطوة ${steps.length + 1}: خطوة جديدة`);
        renderFlow();
    }
    
    function removeLastStep() {
        if (steps.length > 1) {
            steps.pop();
            renderFlow();
        } else {
            alert("لا يمكن حذف الخطوة الوحيدة.");
        }
    }
    
    function setTopic() {
        const newTopic = document.getElementById('topicName').value.trim();
        if (newTopic) {
            topic = newTopic;
            renderFlow();
        }
    }
    
    function saveToLocal() {
        localStorage.setItem('flowMap_steps', JSON.stringify(steps));
        localStorage.setItem('flowMap_topic', topic);
    }
    
    function saveFlowMap() {
        saveToLocal();
        alert("تم حفظ المخطط!");
    }
    
    function loadFlowMap() {
        const savedSteps = localStorage.getItem('flowMap_steps');
        const savedTopic = localStorage.getItem('flowMap_topic');
        if (savedSteps) {
            steps = JSON.parse(savedSteps);
            if (savedTopic) topic = savedTopic;
            renderFlow();
            alert("تم تحميل آخر مخطط محفوظ.");
        } else {
            alert("لا يوجد مخطط محفوظ مسبقاً.");
        }
    }
    
    renderFlow();
</script>
</body>
</html>
